<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — ADHD (에드헤드)</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-box">

      <div class="auth-logo">
        <a href="index.html">ADHD</a>
        <span>에드헤드</span>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" data-panel="login">Sign In</button>
        <button class="auth-tab" data-panel="register">Create Account</button>
      </div>

      <!-- Login Panel -->
      <div class="auth-panel active" id="panel-login">
        <div class="auth-error" id="loginError"></div>
        <form id="loginForm">
          <div class="form-group">
            <label for="loginEmail">Email</label>
            <input type="email" id="loginEmail" placeholder="your@email.com" required />
          </div>
          <div class="form-group">
            <label for="loginPassword">Password</label>
            <input type="password" id="loginPassword" placeholder="••••••••" required />
          </div>
          <button type="submit" class="btn btn--white" style="width:100%;text-align:center;margin-top:8px;">Sign In</button>
        </form>
        <p style="font-size:11px;color:var(--gray-700);text-align:center;margin-top:20px;line-height:1.6;">
          Admin access: use your admin credentials<br/>to be redirected to the admin panel.
        </p>
      </div>

      <!-- Register Panel -->
      <div class="auth-panel" id="panel-register">
        <div class="auth-error" id="registerError"></div>
        <form id="registerForm">
          <div class="form-group">
            <label for="regName">Full Name</label>
            <input type="text" id="regName" placeholder="Your name" required />
          </div>
          <div class="form-group">
            <label for="regEmail">Email</label>
            <input type="email" id="regEmail" placeholder="your@email.com" required />
          </div>
          <div class="form-group">
            <label for="regPassword">Password</label>
            <input type="password" id="regPassword" placeholder="Min. 6 characters" minlength="6" required />
          </div>
          <button type="submit" class="btn btn--white" style="width:100%;text-align:center;margin-top:8px;">Create Account</button>
        </form>
      </div>

      <p style="text-align:center;margin-top:28px;">
        <a href="index.html" style="font-size:11px;color:var(--gray-700);letter-spacing:0.08em;text-transform:uppercase;transition:color 0.2s;" onmouseover="this.style.color='white'" onmouseout="this.style.color='var(--gray-700)'">← Back to Store</a>
      </p>

    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    // Redirect if already logged in
    const s = ADHD.getSession();
    if (s) window.location.href = s.role === 'admin' ? 'admin.html' : 'account.html';

    // Tab switching
    document.querySelectorAll('.auth-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.auth-panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('panel-' + tab.dataset.panel).classList.add('active');
      });
    });

    // Login
    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = e.target.querySelector('button[type=submit]');
      btn.textContent = 'Signing in...';
      btn.disabled = true;
      const result = await ADHD.login(
        document.getElementById('loginEmail').value,
        document.getElementById('loginPassword').value
      );
      if (!result.ok) {
        const err = document.getElementById('loginError');
        err.textContent = result.error;
        err.classList.add('show');
        btn.textContent = 'Sign In';
        btn.disabled = false;
        return;
      }
      window.location.href = result.type === 'admin' ? 'admin.html' : 'account.html';
    });

    // Register
    document.getElementById('registerForm').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = e.target.querySelector('button[type=submit]');
      btn.textContent = 'Creating account...';
      btn.disabled = true;
      const result = await ADHD.register(
        document.getElementById('regName').value,
        document.getElementById('regEmail').value,
        document.getElementById('regPassword').value
      );
      if (!result.ok) {
        const err = document.getElementById('registerError');
        err.textContent = result.error;
        err.classList.add('show');
        btn.textContent = 'Create Account';
        btn.disabled = false;
        return;
      }
      window.location.href = 'account.html';
    });
  </script>
</body>
</html>
